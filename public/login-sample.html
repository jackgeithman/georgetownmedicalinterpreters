<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — Sample</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #F8F9FB;
    color: #111827;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap { width: 100%; max-width: 400px; }

  /* Brand */
  .brand { text-align: center; margin-bottom: 24px; }
  .logo {
    width: 48px; height: 48px; border-radius: 11px;
    background: #041E42;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 0.95rem;
    margin: 0 auto 12px;
  }
  .brand-title { font-size: 1.5rem; font-weight: 700; color: #111827; letter-spacing: -0.02em; }

  /* Card */
  .card {
    background: #fff;
    border: 1.5px solid #E5E7EB;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,.07);
  }

  /* Google button — primary, inviting */
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 15px 20px;
    background: #1D4ED8;
    background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
    border: none; border-radius: 12px;
    font-family: inherit; font-size: 1.05rem; font-weight: 600;
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 14px rgba(37,99,235,.35);
    transition: box-shadow .15s, transform .1s;
  }
  .btn-google:hover {
    box-shadow: 0 6px 20px rgba(37,99,235,.45);
    transform: translateY(-1px);
  }
  .btn-google:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(37,99,235,.3); }
  /* White Google G on dark background */
  .g-icon-wrap {
    width: 28px; height: 28px; border-radius: 6px;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Separator — just spacing, no line */
  .sep { height: 1px; background: #E5E7EB; margin: 20px 0; }

  /* PIN section */
  .pin-label {
    font-size: 1rem; font-weight: 700;
    color: #111827; margin-bottom: 8px; display: block;
  }
  .pin-wrap { position: relative; }
  .pin-input {
    width: 100%; padding: 11px 44px 11px 14px;
    border: 1.5px solid #E5E7EB; border-radius: 10px;
    font-family: inherit; font-size: 1rem; color: #111827;
    background: #fff; outline: none;
  }
  .pin-input:focus { border-color: #2563EB; }
  .pin-eye {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #9CA3AF;
    display: flex; align-items: center; padding: 0;
  }
  .btn-submit {
    margin-top: 10px; width: 100%; padding: 12px;
    background: #2563EB; color: #fff; border: none; border-radius: 10px;
    font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer;
    opacity: 0.45;
  }

  /* Footer — outside card */
  .footer {
    text-align: center; margin-top: 20px;
    font-size: 0.8rem; color: #6B7280; line-height: 1.7;
  }
  .footer a { color: #2563EB; text-decoration: none; }
</style>
</head>
<body>

<div class="wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="logo">GMI</div>
    <p class="brand-title">Georgetown Medical Interpreters</p>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Google — primary action -->
    <button class="btn-google">
      <div class="g-icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/>
          <path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/>
          <path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 0 0 0 10.76l3.98-3.09z"/>
          <path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/>
        </svg>
      </div>
      Volunteer &amp; Admin Login
    </button>

    <!-- Thin separator line, no "or" text -->
    <div class="sep"></div>

    <!-- Clinic PIN -->
    <label class="pin-label">Clinic PIN</label>
    <div class="pin-wrap">
      <input class="pin-input" type="text" inputmode="numeric" placeholder="# # # # # # # # #" />
      <button class="pin-eye" type="button" tabindex="-1">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="btn-submit" disabled>Sign In</button>

  </div>

  <!-- Footer — outside card -->
  <p class="footer">
    By signing in you agree to our
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.<br />
    Questions? <a href="#">Contact Us</a>
  </p>

</div>

</body>
</html>
